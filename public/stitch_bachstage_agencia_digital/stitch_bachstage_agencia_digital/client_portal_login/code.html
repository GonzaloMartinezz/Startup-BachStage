<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | BachStage</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#007137",
                    "surface-container-highest": "#353437",
                    "on-background": "#e5e1e4",
                    "primary-container": "#00ff85",
                    "inverse-on-surface": "#313032",
                    "tertiary-fixed-dim": "#c8c6c8",
                    "surface-container": "#201f22",
                    "surface-container-lowest": "#0e0e10",
                    "surface": "#131315",
                    "on-surface": "#e5e1e4",
                    "on-tertiary-fixed": "#1c1b1d",
                    "on-surface-variant": "#b9cbb9",
                    "tertiary-fixed": "#e5e1e4",
                    "primary-fixed-dim": "#00e476",
                    "surface-container-low": "#1c1b1d",
                    "on-secondary-fixed": "#351000",
                    "on-primary-fixed": "#00210c",
                    "secondary-container": "#fe6b00",
                    "primary": "#f0ffee",
                    "error": "#ffb4ab",
                    "inverse-surface": "#e5e1e4",
                    "secondary-fixed-dim": "#ffb693",
                    "tertiary-container": "#e0dde0",
                    "secondary": "#ffb693",
                    "on-tertiary-container": "#626164",
                    "surface-container-high": "#2a2a2c",
                    "on-secondary": "#561f00",
                    "on-error": "#690005",
                    "background": "#131315",
                    "surface-tint": "#00e476",
                    "inverse-primary": "#006d35",
                    "on-secondary-fixed-variant": "#7a3000",
                    "surface-dim": "#131315",
                    "on-primary-fixed-variant": "#005227",
                    "error-container": "#93000a",
                    "tertiary": "#fdfafd",
                    "on-tertiary": "#313032",
                    "on-primary": "#003919",
                    "outline-variant": "#3b4b3d",
                    "on-secondary-container": "#572000",
                    "secondary-fixed": "#ffdbcc",
                    "on-tertiary-fixed-variant": "#474649",
                    "on-error-container": "#ffdad6",
                    "surface-bright": "#39393b",
                    "surface-variant": "#353437",
                    "primary-fixed": "#61ff97",
                    "outline": "#849584"
            },
            "borderRadius": {
                    "none": "0px",
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Space Grotesk"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Glowing Input Border */
        .glow-input:focus-within {
            box-shadow: 0 0 15px rgba(0, 255, 133, 0.3);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen selection:bg-primary-container selection:text-on-primary">
<!-- Hero Background Image Section -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-black/60 z-10"></div>
<img class="w-full h-full object-cover grayscale opacity-40 brightness-50" data-alt="Macro view of a futuristic obsidian processor chip with glowing emerald circuits and sharp geometric metallic structures in dim lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPk8PPtSR9aAkWDS7K3niia5vFKuxFaFR6G-0ZDZwmhf1Wqnr2BnEvriD5o1lnkvPWaBOilp_tALR4IQHYw9Uurf8aJ7sJTfvf8DShHdKOFbhGdWAz9UY6bgBXFdxj7yc0JyapZjv4SRF_x-YsfIUdDnkCVUcR7hokSOX4mokxOKmni9TYHLfq6vr0U6SyA1IzdJkgcPc9FZfkIQqKqoeycEDbzCKQlwLp8jL50zk1BKgv1RbQlaDvn1dn1N-JTqTnApy-cw2haD8"/>
<!-- Ambient Mesh Gradients -->
<div class="absolute top-0 right-0 w-[50vw] h-[50vw] bg-[#005227] blur-[150px] rounded-full opacity-20 -translate-y-1/2 translate-x-1/2"></div>
<div class="absolute bottom-0 left-0 w-[40vw] h-[40vw] bg-[#fe6b00] blur-[150px] rounded-full opacity-10 translate-y-1/2 -translate-x-1/2"></div>
</div>
<!-- Main Content Shell -->
<main class="relative z-20 flex flex-col items-center justify-center min-h-screen px-6">
<!-- Brand Identity Section (Suppressed Shell - Direct Logo Usage) -->
<div class="mb-12 text-center">
<h1 class="text-4xl md:text-5xl font-black tracking-tighter text-white uppercase font-headline">
                BachStage
            </h1>
<div class="mt-2 h-1 w-24 bg-primary-container mx-auto"></div>
</div>
<!-- Transactional Login Card (Monolith Design) -->
<div class="w-full max-w-md bg-surface/40 backdrop-blur-2xl border-l-2 border-primary-container p-8 md:p-12 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
<!-- Header -->
<div class="mb-10">
<p class="font-label text-[0.75rem] uppercase tracking-[0.2em] text-primary-container font-bold mb-2">Access Portal</p>
<h2 class="text-3xl font-bold text-white font-headline leading-tight">AUTHENTICATE SYSTEM</h2>
</div>
<!-- Login Form -->
<form action="#" class="space-y-8">
<!-- Input Group: ID -->
<div class="space-y-2 group">
<label class="font-label text-[0.7rem] uppercase tracking-widest text-on-surface-variant font-bold block">Operator ID</label>
<div class="relative flex items-center bg-surface-container-lowest border-l-2 border-white/10 glow-input transition-all duration-300">
<span class="pl-4 text-white/40 material-symbols-outlined">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-white font-mono text-sm py-4 px-4 placeholder:text-white/20 uppercase tracking-tighter" placeholder="USERNAME_OR_EMAIL" type="text"/>
</div>
</div>
<!-- Input Group: Credentials -->
<div class="space-y-2 group">
<div class="flex justify-between items-center">
<label class="font-label text-[0.7rem] uppercase tracking-widest text-on-surface-variant font-bold block">Access Key</label>
<a class="text-[10px] uppercase font-label tracking-widest text-secondary-container hover:text-white transition-colors" href="#">Recover?</a>
</div>
<div class="relative flex items-center bg-surface-container-lowest border-l-2 border-white/10 glow-input transition-all duration-300">
<span class="pl-4 text-white/40 material-symbols-outlined">key</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-white font-mono text-sm py-4 px-4 placeholder:text-white/20" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full bg-primary-container py-5 group relative overflow-hidden transition-all duration-300 active:scale-95" type="submit">
<div class="absolute inset-0 bg-white/0 group-hover:bg-white/10 transition-colors"></div>
<div class="relative flex items-center justify-center gap-3">
<span class="text-on-primary font-headline font-black uppercase tracking-widest">Initialise Session</span>
<span class="material-symbols-outlined text-on-primary text-xl">arrow_forward</span>
</div>
</button>
</div>
<!-- Secondary Actions -->
<div class="pt-8 text-center">
<p class="text-on-surface-variant text-xs uppercase tracking-widest font-label">
                        New Operator? <a class="text-white font-bold border-b border-white/20 hover:border-primary-container transition-all" href="#">Request Node Access</a>
</p>
</div>
</form>
</div>
<!-- Meta Information (Data Pillar Style) -->
<div class="mt-16 w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-0.5 bg-white/5 border border-white/5">
<div class="bg-surface p-6 text-center border-b md:border-b-0 md:border-r border-white/5">
<span class="block text-[10px] font-label text-on-surface-variant uppercase tracking-[0.3em] mb-1">System Status</span>
<span class="font-headline text-primary-container font-bold text-xl uppercase">Operational</span>
</div>
<div class="bg-surface p-6 text-center border-b md:border-b-0 md:border-r border-white/5">
<span class="block text-[10px] font-label text-on-surface-variant uppercase tracking-[0.3em] mb-1">Active Nodes</span>
<span class="font-headline text-white font-bold text-xl">1,042,921</span>
</div>
<div class="bg-surface p-6 text-center">
<span class="block text-[10px] font-label text-on-surface-variant uppercase tracking-[0.3em] mb-1">Network Latency</span>
<span class="font-headline text-secondary-container font-bold text-xl">14.2 MS</span>
</div>
</div>
<!-- Footer Suppression (Contextual Minimized Version) -->
<footer class="mt-20 w-full py-12 px-8 border-t border-white/5">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
<div class="text-[10px] font-label text-white/40 tracking-[0.2em] uppercase">
                    © 2024 BACHSTAGE. ALL SYSTEMS OPERATIONAL.
                </div>
<div class="flex gap-8">
<a class="text-[10px] font-label text-white/40 hover:text-primary-container tracking-widest uppercase transition-colors" href="#">Security</a>
<a class="text-[10px] font-label text-white/40 hover:text-primary-container tracking-widest uppercase transition-colors" href="#">Privacy</a>
<a class="text-[10px] font-label text-white/40 hover:text-primary-container tracking-widest uppercase transition-colors" href="#">Terms</a>
</div>
</div>
</footer>
</main>
<!-- Structural Mesh Background Detail (Bottom Right) -->
<div class="fixed bottom-0 right-0 w-[30%] h-[60%] z-10 pointer-events-none opacity-20">
<div class="absolute inset-0 bg-gradient-to-t from-primary-container/20 to-transparent"></div>
</div>
</body></html>
